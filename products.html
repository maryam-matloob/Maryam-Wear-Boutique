<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shop — MaryamWear Boutique</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/responsive.css">
  <style>
    .filter-sidebar{background:var(--white);border:1px solid var(--border);border-radius:14px;padding:24px;position:sticky;top:90px;}
    .filter-heading{font-family:var(--font-head);font-size:1rem;font-weight:600;color:var(--dark);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border);}
    .filter-option{display:flex;align-items:center;gap:9px;padding:6px 0;cursor:pointer;font-size:0.9rem;color:var(--text);transition:color var(--transition);}
    .filter-option:hover{color:var(--primary);}
    .filter-option input[type="checkbox"]{accent-color:var(--primary);width:15px;height:15px;cursor:pointer;}
    .search-bar-wrap{position:relative;}
    .search-bar-wrap input{padding-left:42px;}
    .search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:1rem;color:var(--muted);pointer-events:none;}
    .results-bar{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:24px;padding:14px 18px;background:var(--white);border:1px solid var(--border);border-radius:10px;}
    .results-count{font-size:0.9rem;color:var(--muted);}
    .results-count strong{color:var(--dark);}
    .active-filters-wrap{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:18px;}
    .filter-pill{background:var(--primary-lt);color:var(--primary);border:1px solid var(--primary);padding:4px 12px;border-radius:20px;font-size:0.8rem;font-weight:600;display:flex;align-items:center;gap:6px;cursor:pointer;transition:all var(--transition);}
    .filter-pill:hover{background:var(--primary);color:#fff;}
    .products-grid{min-height:400px;}
    .empty-state{text-align:center;padding:60px 20px;color:var(--muted);}
    .empty-state-icon{font-size:4rem;margin-bottom:1rem;}
    .empty-state h4{font-family:var(--font-head);color:var(--dark);margin-bottom:0.5rem;}
    input[type="range"]{accent-color:var(--primary);width:100%;}
    .price-labels{display:flex;justify-content:space-between;font-size:0.82rem;color:var(--muted);margin-top:4px;}
    .sort-select{border:1.5px solid var(--border);border-radius:8px;padding:8px 14px;font-family:var(--font-body);font-size:0.88rem;color:var(--text);background:var(--white);cursor:pointer;outline:none;transition:border-color var(--transition);}
    .sort-select:focus{border-color:var(--primary);}
    .view-toggle button{background:var(--white);border:1.5px solid var(--border);padding:7px 11px;border-radius:7px;cursor:pointer;font-size:1rem;transition:all var(--transition);color:var(--muted);}
    .view-toggle button.active,.view-toggle button:hover{border-color:var(--primary);color:var(--primary);background:var(--primary-lt);}
    .product-card-list{background:var(--white);border:1px solid var(--border);border-radius:12px;display:flex;overflow:hidden;transition:transform var(--transition),box-shadow var(--transition);margin-bottom:16px;}
    .product-card-list:hover{transform:translateY(-3px);box-shadow:var(--shadow);}
    .product-card-list .list-img{width:160px;min-width:160px;background:var(--primary-lt);display:flex;align-items:center;justify-content:center;font-size:3.5rem;cursor:pointer;}
    .product-card-list .list-body{padding:18px 20px;flex:1;display:flex;flex-direction:column;justify-content:space-between;}
    #mobileFilterBtn{display:none;}
    @media(max-width:991px){#mobileFilterBtn{display:flex;}.desktop-sidebar{display:none;}}
  </style>
</head>
<body>
  <div id="navbar-placeholder"></div>

  <div class="page-header">
    <div class="container">
      <h1>Shop Our Collection</h1>
      <p>Discover elegant Pakistani fashion for every occasion</p>
      <div class="breadcrumb-custom">
        <a href="../index.html">Home</a><span>/</span><span>Shop</span>
      </div>
    </div>
  </div>

  <div class="container py-5">
    <div class="row g-4">

      <!-- DESKTOP FILTER SIDEBAR -->
      <div class="col-lg-3 desktop-sidebar">
        <div class="filter-sidebar">
          <div class="filter-heading">Search</div>
          <div class="search-bar-wrap mb-4">
            <span class="search-icon">🔍</span>
            <input type="text" id="searchInput" class="form-control-custom" placeholder="Search products..." oninput="applyFilters()">
          </div>
          <div class="filter-heading">Category</div>
          <div class="mb-4" id="categoryFilters">
            <label class="filter-option"><input type="checkbox" value="all" checked onchange="handleCategoryChange(this)"> All Items</label>
            <label class="filter-option"><input type="checkbox" value="lawn" onchange="handleCategoryChange(this)"> 🌸 Lawn Collection</label>
            <label class="filter-option"><input type="checkbox" value="formal" onchange="handleCategoryChange(this)"> 👑 Formal Wear</label>
            <label class="filter-option"><input type="checkbox" value="casual" onchange="handleCategoryChange(this)"> 👗 Casual Wear</label>
            <label class="filter-option"><input type="checkbox" value="sale" onchange="handleCategoryChange(this)"> 🏷️ Sale Items</label>
          </div>
          <div class="filter-heading">Max Price</div>
          <div class="mb-4">
            <input type="range" id="priceRange" min="500" max="15000" value="15000" step="500" oninput="updatePriceLabel();applyFilters()">
            <div class="price-labels"><span>Rs. 500</span><span id="priceLabel" style="color:var(--primary);font-weight:600;">Rs. 15,000</span></div>
          </div>
          <div class="filter-heading">Size</div>
          <div class="mb-4 d-flex flex-wrap gap-2" id="sizeFilters"></div>
          <div class="filter-heading">Availability</div>
          <div class="mb-4">
            <label class="filter-option"><input type="checkbox" id="inStockOnly" onchange="applyFilters()"> In Stock Only</label>
            <label class="filter-option"><input type="checkbox" id="onSaleOnly" onchange="applyFilters()"> On Sale Only</label>
            <label class="filter-option"><input type="checkbox" id="newOnly" onchange="applyFilters()"> New Arrivals</label>
          </div>
          <button class="btn-outline-custom w-100" onclick="clearAllFilters()" style="justify-content:center;">Clear All Filters</button>
        </div>
      </div>

      <!-- PRODUCTS AREA -->
      <div class="col-lg-9">
        <button id="mobileFilterBtn" class="btn-outline-custom mb-3" data-bs-toggle="offcanvas" data-bs-target="#mobileFilters">⚙️ Filters &amp; Sort</button>
        <div class="active-filters-wrap" id="activePills"></div>
        <div class="results-bar">
          <div class="results-count">Showing <strong id="resultCount">0</strong> products</div>
          <div class="d-flex align-items-center gap-3">
            <select class="sort-select" id="sortSelect" onchange="applyFilters()">
              <option value="default">Sort: Default</option>
              <option value="price-asc">Price: Low to High</option>
              <option value="price-desc">Price: High to Low</option>
              <option value="name-asc">Name: A–Z</option>
              <option value="newest">Newest First</option>
            </select>
            <div class="view-toggle d-flex gap-1">
              <button id="gridViewBtn" class="active" onclick="setView('grid')" title="Grid">⊞</button>
              <button id="listViewBtn" onclick="setView('list')" title="List">☰</button>
            </div>
          </div>
        </div>
        <div id="productsContainer" class="row g-4 products-grid"></div>
      </div>
    </div>
  </div>

  <!-- Mobile Offcanvas Filter -->
  <div class="offcanvas offcanvas-start" id="mobileFilters" style="width:300px;">
    <div class="offcanvas-header" style="border-bottom:1px solid var(--border);">
      <h5 class="offcanvas-title" style="font-family:var(--font-head);">Filters</h5>
      <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
    </div>
    <div class="offcanvas-body">
      <div class="filter-heading">Search</div>
      <div class="search-bar-wrap mb-4">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInputMobile" class="form-control-custom" placeholder="Search..." oninput="syncSearch(this.value)">
      </div>
      <div class="filter-heading">Category</div>
      <div class="mb-4">
        <label class="filter-option"><input type="checkbox" value="all" checked onchange="handleCategoryChange(this)"> All Items</label>
        <label class="filter-option"><input type="checkbox" value="lawn" onchange="handleCategoryChange(this)"> 🌸 Lawn</label>
        <label class="filter-option"><input type="checkbox" value="formal" onchange="handleCategoryChange(this)"> 👑 Formal</label>
        <label class="filter-option"><input type="checkbox" value="casual" onchange="handleCategoryChange(this)"> 👗 Casual</label>
        <label class="filter-option"><input type="checkbox" value="sale" onchange="handleCategoryChange(this)"> 🏷️ Sale</label>
      </div>
      <div class="filter-heading">Availability</div>
      <div class="mb-4">
        <label class="filter-option"><input type="checkbox" id="inStockOnlyM" onchange="syncCheck('inStockOnly','inStockOnlyM')"> In Stock Only</label>
        <label class="filter-option"><input type="checkbox" id="onSaleOnlyM" onchange="syncCheck('onSaleOnly','onSaleOnlyM')"> On Sale Only</label>
        <label class="filter-option"><input type="checkbox" id="newOnlyM" onchange="syncCheck('newOnly','newOnlyM')"> New Arrivals</label>
      </div>
      <button class="btn-primary-custom w-100" data-bs-dismiss="offcanvas" style="justify-content:center;">Apply Filters</button>
    </div>
  </div>

  <!-- Product Detail Modal -->
  <div class="modal fade" id="productModal" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-centered">
      <div class="modal-content" style="border-radius:16px;border:none;">
        <div class="modal-header" style="border-bottom:1px solid var(--border);padding:20px 24px;">
          <h5 class="modal-title" id="modalTitle" style="font-family:var(--font-head);"></h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body" id="modalBody" style="padding:24px;"></div>
      </div>
    </div>
  </div>

  <div id="footer-placeholder"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module">
    import { renderNavbar, renderFooter, showToast, updateCartCount } from '../js/ui.js';
    import { getAll, seedProducts } from '../js/db.js';

    renderNavbar('shop');
    renderFooter();
    seedProducts();

    let allProducts  = [];
    let currentView  = 'grid';
    let selectedCats = ['all'];
    let selectedSizes = [];
    const ALL_SIZES  = ['S','M','L','XL','XXL','Unstitched'];

    function init() {
      allProducts = getAll('products');
      const sizeWrap = document.getElementById('sizeFilters');
      sizeWrap.innerHTML = ALL_SIZES.map(s =>
        `<button class="size-btn" data-size="${s}" onclick="toggleSize('${s}',this)"
          style="border:1.5px solid var(--border);background:var(--white);border-radius:6px;padding:5px 12px;font-size:0.82rem;cursor:pointer;transition:all 0.2s;color:var(--text);">${s}</button>`
      ).join('');
      const params   = new URLSearchParams(window.location.search);
      const catParam = params.get('cat');
      if (catParam) {
        selectedCats = [catParam];
        document.querySelectorAll('#categoryFilters input[type=checkbox]').forEach(cb => {
          cb.checked = cb.value === catParam;
        });
      }
      applyFilters();
    }

    window.handleCategoryChange = function(cb) {
      if (cb.value === 'all') {
        selectedCats = ['all'];
        document.querySelectorAll('input[type=checkbox][value]').forEach(c => { if(c.value!=='all') c.checked=false; });
        cb.checked = true;
      } else {
        document.querySelectorAll('input[type=checkbox][value="all"]').forEach(c => c.checked=false);
        if (cb.checked) { selectedCats = selectedCats.filter(c=>c!=='all'); selectedCats.push(cb.value); }
        else { selectedCats = selectedCats.filter(c=>c!==cb.value); }
        if (selectedCats.length===0) { selectedCats=['all']; document.querySelectorAll('input[type=checkbox][value="all"]').forEach(c=>c.checked=true); }
      }
      applyFilters();
    };

    window.toggleSize = function(size, btn) {
      if (selectedSizes.includes(size)) {
        selectedSizes = selectedSizes.filter(s=>s!==size);
        btn.style.background='var(--white)'; btn.style.borderColor='var(--border)'; btn.style.color='var(--text)';
      } else {
        selectedSizes.push(size);
        btn.style.background='var(--primary)'; btn.style.borderColor='var(--primary)'; btn.style.color='#fff';
      }
      applyFilters();
    };

    window.updatePriceLabel = function() {
      const val = document.getElementById('priceRange').value;
      document.getElementById('priceLabel').textContent = 'Rs. ' + Number(val).toLocaleString();
    };

    window.syncSearch = function(val) { document.getElementById('searchInput').value=val; applyFilters(); };
    window.syncCheck  = function(dId, mId) { document.getElementById(dId).checked = document.getElementById(mId).checked; applyFilters(); };

    window.applyFilters = function() {
      const search   = (document.getElementById('searchInput')?.value||'').toLowerCase().trim();
      const maxPrice = Number(document.getElementById('priceRange')?.value||15000);
      const inStock  = document.getElementById('inStockOnly')?.checked;
      const onSale   = document.getElementById('onSaleOnly')?.checked;
      const isNew    = document.getElementById('newOnly')?.checked;
      const sort     = document.getElementById('sortSelect')?.value||'default';

      let results = [...allProducts];
      if (!selectedCats.includes('all')) {
        results = results.filter(p => selectedCats.includes('sale') ? p.onSale : selectedCats.includes(p.category));
      }
      if (search)   results = results.filter(p => p.name.toLowerCase().includes(search)||p.description?.toLowerCase().includes(search)||p.category.toLowerCase().includes(search));
      results = results.filter(p => p.price <= maxPrice);
      if (inStock)  results = results.filter(p => p.stock > 0);
      if (onSale)   results = results.filter(p => p.onSale);
      if (isNew)    results = results.filter(p => p.isNew);
      if (selectedSizes.length > 0) results = results.filter(p => p.sizes && p.sizes.some(s=>selectedSizes.includes(s)));
      if (sort==='price-asc')  results.sort((a,b)=>a.price-b.price);
      if (sort==='price-desc') results.sort((a,b)=>b.price-a.price);
      if (sort==='name-asc')   results.sort((a,b)=>a.name.localeCompare(b.name));
      if (sort==='newest')     results.sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));
      renderProducts(results);
      renderActivePills(search, maxPrice, inStock, onSale, isNew);
      document.getElementById('resultCount').textContent = results.length;
    };

    function renderProducts(list) {
      const container = document.getElementById('productsContainer');
      if (list.length === 0) {
        container.innerHTML = `<div class="col-12"><div class="empty-state"><div class="empty-state-icon">🔍</div><h4>No products found</h4><p>Try adjusting your filters or search term.</p><button class="btn-primary-custom mt-3" onclick="clearAllFilters()">Clear Filters</button></div></div>`;
        return;
      }
      if (currentView === 'grid') {
        container.className = 'row g-4 products-grid';
        container.innerHTML = list.map(p => gridCard(p)).join('');
      } else {
        container.className = 'products-grid';
        container.innerHTML = list.map(p => listCard(p)).join('');
      }
      const wishlist = JSON.parse(localStorage.getItem('mw_wishlist')||'[]');
      wishlist.forEach(id => {
        const btn = document.querySelector(`.wl-btn[data-id="${id}"]`);
        if (btn) { btn.textContent='♥'; btn.classList.add('active'); }
      });
    }

    function gridCard(p) {
      const dp = p.onSale ? Math.round(p.price*0.8) : p.price;
      return `<div class="col-md-4 col-sm-6">
        <div class="product-card">
          <div class="product-card-img" onclick="openModal('${p.id}')" style="cursor:pointer;">
            ${p.image?`<img src="${p.image}" alt="${p.name}">`:`<span style="font-size:4rem">${p.emoji||'👗'}</span>`}
            <div class="product-card-badges">
              ${p.onSale?'<span class="badge-sale">Sale</span>':''}
              ${p.isNew?'<span class="badge-new">New</span>':''}
              ${p.stock===0?'<span class="badge-sale" style="background:var(--muted)">Sold Out</span>':''}
            </div>
            <button class="product-card-wishlist wl-btn" data-id="${p.id}" onclick="event.stopPropagation();toggleWishlist('${p.id}',this)">♡</button>
          </div>
          <div class="product-card-body">
            <div class="product-card-category">${p.category}</div>
            <div class="product-card-name">${p.name}</div>
            <div style="font-size:0.8rem;color:var(--muted);margin-bottom:8px;">
              ${(p.sizes||[]).map(s=>`<span style="border:1px solid var(--border);border-radius:4px;padding:1px 6px;margin-right:3px;">${s}</span>`).join('')}
            </div>
            <div class="product-card-price">
              <span class="price-current">Rs. ${dp.toLocaleString()}</span>
              ${p.onSale?`<span class="price-original">Rs. ${p.price.toLocaleString()}</span>`:''}
            </div>
            <button class="btn-primary-custom w-100" onclick="addToCart('${p.id}')" ${p.stock===0?'disabled style="opacity:0.5;cursor:not-allowed;"':''}>
              ${p.stock===0?'Out of Stock':'Add to Cart'}
            </button>
          </div>
        </div>
      </div>`;
    }

    function listCard(p) {
      const dp = p.onSale ? Math.round(p.price*0.8) : p.price;
      return `<div class="product-card-list">
        <div class="list-img" onclick="openModal('${p.id}')">
          ${p.image?`<img src="${p.image}" alt="${p.name}" style="width:100%;height:100%;object-fit:cover;">`:`<span>${p.emoji||'👗'}</span>`}
        </div>
        <div class="list-body">
          <div>
            <div style="display:flex;gap:6px;margin-bottom:6px;flex-wrap:wrap;">
              <span style="font-size:0.75rem;text-transform:uppercase;letter-spacing:0.8px;color:var(--muted);">${p.category}</span>
              ${p.onSale?'<span class="badge-sale">Sale</span>':''}${p.isNew?'<span class="badge-new">New</span>':''}
            </div>
            <h5 style="font-family:var(--font-head);font-size:1.05rem;margin-bottom:6px;">${p.name}</h5>
            <p style="font-size:0.87rem;color:var(--muted);margin-bottom:8px;line-height:1.6;">${p.description||''}</p>
            <div style="font-size:0.8rem;color:var(--muted);margin-bottom:10px;">
              ${(p.sizes||[]).map(s=>`<span style="border:1px solid var(--border);border-radius:4px;padding:1px 6px;margin-right:3px;">${s}</span>`).join('')}
            </div>
          </div>
          <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;">
            <div class="product-card-price" style="margin:0;">
              <span class="price-current">Rs. ${dp.toLocaleString()}</span>
              ${p.onSale?`<span class="price-original">Rs. ${p.price.toLocaleString()}</span>`:''}
            </div>
            <div style="display:flex;gap:8px;">
              <button class="product-card-wishlist wl-btn" data-id="${p.id}" onclick="toggleWishlist('${p.id}',this)"
                style="position:static;box-shadow:none;border:1.5px solid var(--border);width:38px;height:38px;">♡</button>
              <button class="btn-primary-custom" onclick="addToCart('${p.id}')" ${p.stock===0?'disabled style="opacity:0.5;"':''}>
                ${p.stock===0?'Out of Stock':'Add to Cart'}
              </button>
            </div>
          </div>
        </div>
      </div>`;
    }

    function renderActivePills(search, maxPrice, inStock, onSale, isNew) {
      const pills = [];
      if (search) pills.push({ label:`"${search}"`, clear:()=>{ document.getElementById('searchInput').value=''; applyFilters(); }});
      if (!selectedCats.includes('all')) selectedCats.forEach(c=>pills.push({ label:c, clear:()=>{ selectedCats=['all']; document.querySelectorAll('input[type=checkbox][value="all"]').forEach(cb=>cb.checked=true); document.querySelectorAll(`input[type=checkbox][value="${c}"]`).forEach(cb=>cb.checked=false); applyFilters(); }}));
      if (maxPrice<15000) pills.push({ label:`Max Rs. ${Number(maxPrice).toLocaleString()}`, clear:()=>{ document.getElementById('priceRange').value=15000; updatePriceLabel(); applyFilters(); }});
      if (inStock) pills.push({ label:'In Stock', clear:()=>{ document.getElementById('inStockOnly').checked=false; applyFilters(); }});
      if (onSale)  pills.push({ label:'On Sale',  clear:()=>{ document.getElementById('onSaleOnly').checked=false;  applyFilters(); }});
      if (isNew)   pills.push({ label:'New',      clear:()=>{ document.getElementById('newOnly').checked=false;     applyFilters(); }});
      selectedSizes.forEach(s=>pills.push({ label:`Size: ${s}`, clear:()=>{ toggleSize(s, document.querySelector(`.size-btn[data-size="${s}"]`)); }}));
      document.getElementById('activePills').innerHTML = pills.map((p,i)=>`<span class="filter-pill" onclick="clearPill(${i})">${p.label} ✕</span>`).join('');
      window._pillClears = pills.map(p=>p.clear);
    }

    window.clearPill = function(i) { window._pillClears[i]?.(); };

    window.clearAllFilters = function() {
      document.getElementById('searchInput').value='';
      document.getElementById('priceRange').value=15000;
      document.getElementById('inStockOnly').checked=false;
      document.getElementById('onSaleOnly').checked=false;
      document.getElementById('newOnly').checked=false;
      selectedCats=['all']; selectedSizes=[];
      document.querySelectorAll('#categoryFilters input').forEach(cb=>cb.checked=cb.value==='all');
      document.querySelectorAll('.size-btn').forEach(btn=>{ btn.style.background='var(--white)'; btn.style.borderColor='var(--border)'; btn.style.color='var(--text)'; });
      updatePriceLabel(); applyFilters();
    };

    window.setView = function(view) {
      currentView = view;
      document.getElementById('gridViewBtn').classList.toggle('active', view==='grid');
      document.getElementById('listViewBtn').classList.toggle('active', view==='list');
      applyFilters();
    };

    window.openModal = function(id) {
      const p = allProducts.find(x=>x.id===id); if(!p) return;
      const dp = p.onSale ? Math.round(p.price*0.8) : p.price;
      document.getElementById('modalTitle').textContent = p.name;
      document.getElementById('modalBody').innerHTML = `
        <div class="row g-4">
          <div class="col-md-5">
            <div style="background:var(--primary-lt);border-radius:12px;height:280px;display:flex;align-items:center;justify-content:center;font-size:6rem;">${p.emoji||'👗'}</div>
          </div>
          <div class="col-md-7">
            <span style="font-size:0.78rem;text-transform:uppercase;letter-spacing:1px;color:var(--muted);">${p.category}</span>
            <h3 style="font-family:var(--font-head);margin:6px 0 12px;">${p.name}</h3>
            <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px;">
              <span style="font-size:1.4rem;font-weight:700;color:var(--primary);">Rs. ${dp.toLocaleString()}</span>
              ${p.onSale?`<span style="font-size:1rem;color:var(--muted);text-decoration:line-through;">Rs. ${p.price.toLocaleString()}</span><span class="badge-sale">20% off</span>`:''}
            </div>
            <p style="font-size:0.92rem;color:var(--muted);line-height:1.7;margin-bottom:16px;">${p.description||''}</p>
            <div style="margin-bottom:12px;">
              <strong style="font-size:0.85rem;">Sizes:</strong>
              <div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;">
                ${(p.sizes||[]).map(s=>`<span style="border:1.5px solid var(--border);border-radius:6px;padding:4px 12px;font-size:0.85rem;">${s}</span>`).join('')}
              </div>
            </div>
            <div style="margin-bottom:16px;">
              <strong style="font-size:0.85rem;">Colors:</strong>
              <span style="color:var(--muted);font-size:0.88rem;margin-left:6px;">${(p.colors||[]).join(', ')}</span>
            </div>
            <div style="font-size:0.85rem;margin-bottom:20px;">
              <span style="color:${p.stock>0?'var(--success)':'var(--primary)'};">
                ${p.stock>0?`✓ In Stock (${p.stock} left)`:'✕ Out of Stock'}
              </span>
            </div>
            <button class="btn-primary-custom w-100" onclick="addToCart('${p.id}')" data-bs-dismiss="modal" ${p.stock===0?'disabled style="opacity:0.5;"':''}>Add to Cart</button>
          </div>
        </div>`;
      new bootstrap.Modal(document.getElementById('productModal')).show();
    };

    window.addToCart = function(id) {
      const p = allProducts.find(x=>x.id===id); if(!p||p.stock===0) return;
      const cart = JSON.parse(localStorage.getItem('mw_cart')||'[]');
      const ex   = cart.find(i=>i.id===id);
      if (ex) ex.qty+=1; else cart.push({id, name:p.name, price:p.onSale?Math.round(p.price*0.8):p.price, qty:1, emoji:p.emoji||'👗'});
      localStorage.setItem('mw_cart', JSON.stringify(cart));
      updateCartCount();
      showToast(`${p.name} added to cart!`, 'success');
    };

    window.toggleWishlist = function(id, btn) {
      const wl  = JSON.parse(localStorage.getItem('mw_wishlist')||'[]');
      const idx = wl.indexOf(id);
      if (idx===-1) { wl.push(id); btn.textContent='♥'; btn.classList.add('active'); showToast('Added to wishlist!','success'); }
      else { wl.splice(idx,1); btn.textContent='♡'; btn.classList.remove('active'); showToast('Removed from wishlist.'); }
      localStorage.setItem('mw_wishlist', JSON.stringify(wl));
    };

    init();
  </script>
</body>
</html>
